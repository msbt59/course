models:
  - name: dim_listings_cleansed
    description: "Cleansed table wich contains Airbnb listings"
    data_tests:
      - minimum_row_count:
          arguments:
            min_row_count: 1000
    columns:
      - name: listing_id
        description: "Unique identifier for each listing PK"
        data_tests:
          - unique
          - not_null
      - name: host_id
        description: "Unique identifier for each host FK"
        data_tests:
         - not_null
         - relationships:
             arguments:
               to: ref('dim_hosts_cleanesed')
               field: host_id
      - name: room_type
        description: "Type of room being listed"
        data_tests:
         - accepted_values:
             arguments:
               values: ['Entire home/apt',
                        'Private room',
                        'Shared room',
                        'Hotel room']
      - name: minimum_nights
        description: '{{ doc("dim_listing_cleansed__minimum_nights") }}'
        data_tests:
         - positive_values
  
  - name: dim_hosts_cleanesed
    description: Cleansed table for the Airbnb hosts
    config:
      contract:
        enforced : true
    constraints:
      - type: primary_key
        columns: ['host_id']
        warn_unenforced: false
    columns:
      - name: host_id
        description: The id of the host. This is the primary key.
        data_type : integer
        constraints:
          - type: not_null
          - type: unique
            warn_unenforced: false
        data_tests:
          - unique
      - name: host_name
        description: The name of the host
        data_type : string
        constraints:
          - type: not_null
      - name: is_superhost
        description: Defines whether the hosts is a superhost.
        data_type : string
        data_tests:
         - accepted_values:
             arguments:
               values: ['t','f']
      - name : updated_at
        data_type : timestamp
      - name : created_at
        data_type : timestamp
  - name: dim_listings_w_hosts
    data_tests:
      - dbt_expectations.expect_table_row_count_to_equal_other_table:
          arguments:
            compare_model: source('airbnb', 'listings')
    columns:
      - name: price
        data_tests:
          - dbt_expectations.expect_column_quantile_values_to_be_between:
              arguments:
                quantile: .99
                min_value: 50
                max_value: 500
          - dbt_expectations.expect_column_max_to_be_between:
              max_value: 5000
              config:
                severity: warn
